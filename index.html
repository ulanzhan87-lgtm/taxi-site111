<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<title>Mak Fashion Store Almaty | Интернет магазин одежды от</title>

<meta name="description" content="Интернет магазин одежды в Алматы">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#f7f7f7;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:#000;
color:white;
position:sticky;
top:0;
}

.logo{
font-size:22px;
font-weight:bold;
}

.menu a{
margin:0 15px;
text-decoration:none;
color:white;
}

.cart-icon{
cursor:pointer;
font-size:22px;
}

.hero{
height:400px;
background:url("https://images.unsplash.com/photo-1523381294911-8d3cead13475") center/cover;
display:flex;
align-items:center;
padding-left:80px;
color:white;
}

button{
padding:12px 25px;
background:#FFD600;
border:none;
cursor:pointer;
border-radius:6px;
}

.section{
padding:60px;
text-align:center;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
}

.product{
background:white;
width:240px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:260px;
object-fit:cover;
}

.product-info{
padding:20px;
}

.price{
font-weight:bold;
margin:10px 0;
}

.add-btn{
background:black;
color:white;
padding:10px;
border:none;
cursor:pointer;
border-radius:5px;
}

.cart-panel{
position:fixed;
right:-350px;
top:0;
width:300px;
height:100%;
background:white;
box-shadow:-5px 0 20px rgba(0,0,0,0.2);
padding:20px;
transition:0.4s;
overflow:auto;
}

.cart-panel.open{
right:0;
}

.cart-header{
display:flex;
justify-content:space-between;
align-items:center;
}

.close-cart{
background:red;
color:white;
border:none;
padding:6px 10px;
cursor:pointer;
border-radius:4px;
}

.remove-btn{
background:red;
color:white;
border:none;
padding:4px 8px;
margin-left:10px;
cursor:pointer;
border-radius:4px;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50px;
text-decoration:none;
}

</style>

</head>

<body>

<header>

<div class="logo">👕 Fashion Store</div>

<div class="menu">
<a href="#catalog">Каталог</a>
<a href="#contacts">Контакты</a>
</div>

<div class="cart-icon" onclick="toggleCart()">
🛒 <span id="cart-count">0</span>
</div>

</header>

<section class="hero">

<div>
<h1>Интернет магазин одежды</h1>
<p>Кроссовки, футболки, худи</p>
<a href="#catalog"><button>Смотреть товары</button></a>
</div>

</section>

<section class="section" id="catalog">

<h2>Товары</h2>

<div class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<div class="product-info">
<h3>Nike Air Max</h3>
<div class="price">45000 ₸</div>
<button class="add-btn" onclick="addToCart('Nike Air Max',45000)">В корзину</button>
</div>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
<div class="product-info">
<h3>Adidas Samba</h3>
<div class="price">38000 ₸</div>
<button class="add-btn" onclick="addToCart('Adidas Samba',38000)">В корзину</button>
</div>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<div class="product-info">
<h3>Oversize футболка</h3>
<div class="price">12000 ₸</div>
<button class="add-btn" onclick="addToCart('Oversize футболка',12000)">В корзину</button>
</div>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1503341504253-dff4815485f1">
<div class="product-info">
<h3>Черное худи</h3>
<div class="price">18000 ₸</div>
<button class="add-btn" onclick="addToCart('Черное худи',18000)">В корзину</button>
</div>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246">
<div class="product-info">
<h3>Street jacket</h3>
<div class="price">32000 ₸</div>
<button class="add-btn" onclick="addToCart('Street jacket',32000)">В корзину</button>
</div>
</div>

</div>

</section>

<section class="section" id="contacts">

<h2>Контакты</h2>

<p>WhatsApp: +7 707 778 44 45</p>
<p>Алматы</p>

</section>

<div class="cart-panel" id="cart">

<div class="cart-header">
<h2>Корзина</h2>
<button class="close-cart" onclick="toggleCart()">✖</button>
</div>

<div id="cart-items"></div>

<h3>Итого: <span id="total">0</span> ₸</h3>

<button onclick="checkout()">Оформить</button>

</div>

<a href="https://wa.me/77077784445" class="whatsapp">WhatsApp</a>

<script>

let cart=[];

function addToCart(name,price){

cart.push({name,price});

updateCart();

}

function updateCart(){

let items=document.getElementById("cart-items");

items.innerHTML="";

let total=0;

cart.forEach((item,index)=>{

total+=item.price;

items.innerHTML+=`
<div class="cart-item">
<span>${item.name} ${item.price}₸</span>
<button class="remove-btn" onclick="removeItem(${index})">✖</button>
</div>
`;

});

document.getElementById("total").innerText=total;

document.getElementById("cart-count").innerText=cart.length;

}

function removeItem(index){

cart.splice(index,1);

updateCart();

}

function toggleCart(){

document.getElementById("cart").classList.toggle("open");

}

function checkout(){

let text="Здравствуйте, хочу заказать:%0A";

cart.forEach(item=>{
text+=item.name+" "+item.price+"₸%0A";
});

window.open("https://wa.me/77077784445?text="+text);

}

</script>

</body>
</html>
